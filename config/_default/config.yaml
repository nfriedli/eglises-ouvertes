baseURL:        https://eglises-ouvertes.ch/
title:          Églises ouvertes

defaultContentLanguage: fr
languageCode:   fr-ch

# canonifyURLs: true
copyright: CC0 (domaine public)
disableFastRender: true
cleanDestinationDir: true
removePathAccents: true
# enableGitInfo: true

author:
  name: Nicolas Friedli
  email: nicolas.friedli+eo@gmail.com

disableKinds:
  - RSS
  - robotsTXT
  - taxonomy
  - term
  - 404

frontmatter:
  date:
    - date
    - lastmod
  lastmod:
    - lastmod
    - :git

markup:
  goldmark:
    parser:
      autoHeadingIDType: github-ascii

outputs:
  home:
    - html
    - json
  section:
    - html
    - json
  page:
    - html

params:
  description: édifices protestants réformés en Suisse romande
  images:
    - https://pixabay.com/fr/photos/l%c3%a9ger-chapelle-%c3%a9glise-architecture-3176887/
    - https://pixabay.com/fr/photos/%c3%a9glise-islande-l-%c3%a9glise-noire-4964183/
  footer: |
      **Licence:** [Creative Commons Zero (CC0)](https://fr.wikipedia.org/wiki/Licence_CC0)  
      **Code source:** [GitHub](https://github.com/nfriedli/eglises-ouvertes)  
      **Liens conseillés:** [Réseau protestant](https://reseau-protestant.ch/liste/) & [Trouver ma paroisse](https://ma-paroisse.ch/)